<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Sociales</title>
    <style>
        body {
            background-image: url('assets/fondo.png');
            background-size: 200px;
            background-repeat: repeat;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        .logo-container {
            width: 100%;
            background-image: url('assets/fondoalt.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }
        .logo-container img {
            width: 300px;
            height: auto;
        }
        .main-button {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            font-family: Arial, sans-serif;
            color: #800000;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.5);
        }
        .main-button img {
            width: 50px;
            height: auto;
            margin-right: 10px;
        }
        .bold-text {
            font-size: 16px;
            font-weight: bold;
        }
        .section {
            width: 90%;
            max-width: 1000px;
            background-color: rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            border-radius: 12px;
            color: #a52a2a;
            text-align: center;
            font-family: "Arial Black", sans-serif;
            border: 4px solid #800000;
            padding: 30px;
            margin-top: 40px;
            margin-bottom: 20px;
            height: auto;
        }
        .social-container {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: nowrap;
        }
        .social-box {
            width: 300px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .social-box img {
            width: 180px;
            height: 120px;
            object-fit: contain;
        }
        .social-box a {
            text-decoration: none;
            color: inherit;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .facebook a { color: #003366; }
        .instagram a { color: #C13584; }
        .tripadvisor a { color: #007F5F; }
        /* Estilos del modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-content {
            width: 80%;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 4px solid #a52a2a;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            position: relative;
        }
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .button-container a img {
            width: 150px;
            height: auto;
            cursor: pointer;
        }
        .close-btn {
            background-color: #a52a2a;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        /* Estilos del mapa */
        .map-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
        }
        .map-container iframe {
            width: 100%;
            height: 450px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="main-button">
        <img src="assets/logo.png" alt="Logo">
        <div>
            <span style="font-size: 22px; font-weight: bold;">Kintuchay</span><br>
            <span class="bold-text">Restobar</span>
        </div>
    </div>

    <div class="logo-container">
        <img src="assets/logop.png" alt="Logotipo">
    </div>

    <div class="section">
        REDES
        <div class="social-container">
            <div class="social-box facebook">
                <a href="#" target="_blank">
                    <img src="assets/facebook.gif" alt="Facebook">
                    <span>FACEBOOK</span>
                </a>
            </div>
            <div class="social-box instagram">
                <a href="#" target="_blank">
                    <img src="assets/instagram.gif" alt="Instagram">
                    <span>INSTAGRAM</span>
                </a>
            </div>
            <div class="social-box tripadvisor">
                <a href="#" target="_blank">
                    <img src="assets/tripadvisor.gif" alt="Tripadvisor">
                    <span>TRIPADVISOR</span>
                </a>
            </div>
        </div>
    </div>

    <div class="section">
        MENÚS
        <div class="social-container">
            <div class="social-box" onclick="openModal('comidas')">
                <img src="assets/comidas.png" alt="Comidas">
            </div>
            <div class="social-box" onclick="openModal('bebidas')">
                <img src="assets/bebidas.png" alt="Bebidas">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="map-container">
            <iframe 
                src="https://maps.google.com/maps?q=Kintuchay&output=embed"
                allowfullscreen 
                loading="lazy">
            </iframe>
        </div>
    </div>

    <script>
        function openModal(type) {
            let modal = document.getElementById(`modal-${type}`);
            modal.style.display = "flex";
            modal.style.opacity = "1";
        }
        function closeModal(type) {
            let modal = document.getElementById(`modal-${type}`);
            modal.style.display = "none";
            modal.style.opacity = "0";
        }
    </script>

</body>
</html>
